<div class="container-fluid my-5 px-5">
  <div class="card shadow-lg border-0 rounded-4 overflow-hidden">

    <!-- CABECERA -->
    <div
      class="card-header d-flex justify-content-between align-items-center py-3"
      style="
        background: linear-gradient(90deg, #0d6efd, #0b5ed7);
        color: #f8f9fa;
        border-bottom: 4px solid #ff9800;
      "
    >
      <h3 class="m-0 fw-bold d-flex align-items-center">
        <i class="bi bi-envelope-paper-fill me-2" style="color: #ffe9c2"></i>
        {{ item.idSolicitud ? "Editar Solicitud" : "Nueva Solicitud" }}
      </h3>

      <button
        class="btn btn-light rounded-pill px-4 fw-semibold"
        (click)="back()"
      >
        <i class="bi bi-arrow-left me-2"></i>
        Volver
      </button>
    </div>

    <!-- CUERPO -->
    <div class="card-body bg-light py-4">

      <form #frm="ngForm" (ngSubmit)="guardar()" novalidate>

        <div class="row g-4">

          <!-- NUMERO DE NOTA -->
          <div class="col-md-3">
            <label class="form-label fw-semibold">
              N° Nota <span class="text-danger">*</span>
            </label>

            <input
              type="text"
              class="form-control rounded-pill px-4"
              name="nroNota"
              [(ngModel)]="item.nroNota"
              required
            />
          </div>

          <!-- FECHA SOLICITUD -->
          <div class="col-md-3">
            <label class="form-label fw-semibold">
              Fecha Solicitud <span class="text-danger">*</span>
            </label>

            <input
              type="date"
              class="form-control rounded-pill px-4"
              name="fechaSolicitud"
              [(ngModel)]="item.fechaSolicitud"
              required
            />
          </div>

          <!-- ESTADO -->
          <div class="col-md-3">
            <label class="form-label fw-semibold">
              Estado <span class="text-danger">*</span>
            </label>

            <select
              class="form-select rounded-pill px-4"
              name="estado"
              [(ngModel)]="item.estado"
              required
            >
              <option value="">Seleccione estado</option>
              <option value="Pendiente">Pendiente</option>
              <option value="En desarrollo">En desarrollo</option>
              <option value="Desarrollado">Finalizado</option>
              <option value="Desarrollado">Rechazado</option>
            </select>
          </div>

          <!-- UNIDAD -->
          <div class="col-md-3">
            <label class="form-label fw-semibold">
              Unidad <span class="text-danger">*</span>
            </label>

            <app-fil-autocompletado-unidad
              (unidadSeleccionada)="unidadSeleccionada($event)"
            ></app-fil-autocompletado-unidad>

            <!-- unidad seleccionada -->
            <small
              *ngIf="item.nombreUnidad"
              class="text-primary fw-semibold"
            >
              <i class="bi bi-building me-1"></i>
              {{ item.nombreUnidad }}
            </small>
          </div>

          <!-- DETALLE SOLICITUD -->
          <div class="col-12">
            <label class="form-label fw-semibold">
              Detalle de la Solicitud
            </label>

            <textarea
              class="form-control rounded-4 px-4 py-3"
              rows="4"
              name="detalleSol"
              [(ngModel)]="item.detalleSol"
              placeholder="Describa lo solicitado en la nota..."
            ></textarea>
          </div>

        </div>

        <!-- BOTONES -->
        <div class="d-flex justify-content-end gap-3 mt-5">

          <button
            type="submit"
            class="btn btn-primary rounded-pill px-5 fw-semibold"
            [disabled]="frm.invalid"
          >
            <i class="bi bi-check-circle me-2"></i>
            {{ item.idSolicitud ? "Actualizar" : "Guardar" }}
          </button>

        </div>

      </form>

    </div>

    <!-- FOOTER -->
    <div
      class="card-footer text-muted small bg-white border-top fw-semibold py-3"
    >
      Los campos marcados con * son obligatorios
    </div>

  </div>
</div>
