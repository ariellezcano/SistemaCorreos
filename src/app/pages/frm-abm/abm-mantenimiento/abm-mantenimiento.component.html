<div class="container-fluid my-5 px-5">
  <div class="card shadow-lg border-0 rounded-4 overflow-hidden">

    <!-- CABECERA -->
    <div
      class="card-header d-flex justify-content-between align-items-center py-3"
      style="
        background: linear-gradient(90deg, #0d6efd, #0b5ed7);
        color: #f8f9fa;
        border-bottom: 4px solid #ff9800;
      "
    >
      <h3 class="m-0 fw-bold d-flex align-items-center">
        <i class="bi bi-tools me-2" style="color: #ffe9c2"></i>

        {{ item.idMantenimiento ? 'Editar Mantenimiento' : 'Nuevo Mantenimiento' }}
      </h3>

      <button
        class="btn btn-light rounded-pill px-4 fw-semibold"
        routerLink="/mantenimientos"
      >
        <i class="bi bi-arrow-left me-2"></i>
        Volver
      </button>
    </div>

    <!-- CUERPO -->
    <div class="card-body bg-light py-4">

      <form #frm="ngForm" (ngSubmit)="guardar()" novalidate>

        <div class="row g-4">

          <!-- SISTEMA -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">
              Sistema <span class="text-danger">*</span>
            </label>

            <select
              class="form-select rounded-pill px-4"
              name="sistema"
              [(ngModel)]="item.sistema"
              required
            >
              <option value="">Seleccione un sistema</option>

              <option
                *ngFor="let s of sistemas"
                [value]="s.id"
              >
                {{ s.nombre }}
              </option>
            </select>
          </div>

          <!-- FECHA -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">
              Fecha de Trabajo <span class="text-danger">*</span>
            </label>

            <input
              type="date"
              class="form-control rounded-pill px-4"
              name="fechaTrabajo"
              [(ngModel)]="item.fechaTrabajo"
              required
            />
          </div>

          <!-- DETALLE -->
          <div class="col-12">
            <label class="form-label fw-semibold">
              Detalle del Mantenimiento <span class="text-danger">*</span>
            </label>

            <textarea
              class="form-control rounded-4 px-4 py-3"
              rows="4"
              name="detalleMantenimiento"
              [(ngModel)]="item.detalleMantenimiento"
              required
              placeholder="Ingrese el detalle del mantenimiento realizado"
            ></textarea>
          </div>

        </div>

        <!-- ACCIONES -->
        <div class="d-flex justify-content-end gap-3 mt-5">

          <button
            type="button"
            class="btn btn-outline-secondary rounded-pill px-4"
            (click)="back()"
          >
            <i class="bi bi-x-circle me-2"></i>
            Cancelar
          </button>

          <button
            type="submit"
            class="btn btn-primary rounded-pill px-5 fw-semibold"
            [disabled]="frm.invalid"
          >
            <i class="bi bi-check-circle me-2"></i>

            {{ item.idMantenimiento ? 'Actualizar' : 'Guardar' }}

          </button>

        </div>

      </form>

    </div>

    <!-- FOOTER -->
    <div
      class="card-footer text-muted small bg-white border-top fw-semibold py-3"
    >
      Los campos marcados con * son obligatorios
    </div>

  </div>
</div>
