<form (ngSubmit)="generarRecibo()" #form="ngForm">

  <div class="card mt-4 shadow-lg border-0 datos-entrega-card">

    <!-- HEADER -->
    <div class="card-header entrega-header text-white">
      <div class="d-flex align-items-center">
        <div class="header-icon me-3">
          <i class="bi bi-file-earmark-text-fill"></i>
        </div>

        <div>
          <h5 class="m-0 fw-bold">Generación de Recibo</h5>

          <small class="opacity-75">
            Seleccione la fecha y la unidad para generar el recibo
          </small>
        </div>
      </div>
    </div>

    <!-- BODY -->
    <div class="card-body p-4">

      <div class="row g-4">

        <!-- FECHA -->
        <div class="col-md-4">
          <div class="section-box">
            <div class="section-title warning">
              <i class="bi bi-calendar-date me-2"></i>
              Fecha de Entrega
            </div>

            <input
              type="date"
              class="form-control custom-input"
              [(ngModel)]="fechaEntrega"
              name="fechaEntrega"
              required
            />

            <small
              *ngIf="fechaEntrega"
              class="selected-info text-warning"
            >
              <i class="bi bi-check-circle-fill me-1"></i>
              Fecha seleccionada correctamente
            </small>
          </div>
        </div>

        <!-- UNIDAD -->
        <div class="col-md-8">
          <div class="section-box">
            <div class="section-title success">
              <i class="bi bi-building me-2"></i>
              Unidad Destinataria
            </div>

            <app-fil-autocompletado-unidad
              (unidadSeleccionada)="unidadSeleccionada($event)"
            >
            </app-fil-autocompletado-unidad>

            <input
              type="hidden"
              [(ngModel)]="unidad"
              name="unidad"
              required
            />

            <small
              *ngIf="nombreUnidad"
              class="selected-info text-success"
            >
              <i class="bi bi-check-circle-fill me-1"></i>
              {{ nombreUnidad }}
            </small>
          </div>
        </div>

      </div>

      <hr class="my-4">

      <!-- BOTONES -->
      <div class="d-flex justify-content-end gap-2">

        <button
          type="submit"
          class="btn btn-primary px-4 shadow-sm"
          [disabled]="!fechaEntrega || !unidad"
        >
          <i class="bi bi-file-earmark-pdf-fill me-2"></i>
          Generar Recibo
        </button>

        <button
          type="button"
          class="btn btn-secondary px-4 shadow-sm"
          (click)="back()"
        >
          <i class="bi bi-arrow-left me-2"></i>
          Volver
        </button>

      </div>

    </div>

  </div>

</form>
